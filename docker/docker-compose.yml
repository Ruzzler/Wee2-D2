version: '3.8'

services:
  wee2d2-ota-runner:
    build:
      context: ./runner
    container_name: Wee2-D2_Local_Build_Server
    restart: unless-stopped
    network_mode: host # Required for mDNS/OTA discovery
    environment:
      - REPO_URL=https://github.com/Ruzzler/Wee2-D2
      - ACCESS_TOKEN=${GITHUB_PAT} # Set this in your Unraid .env or template
      - RUNNER_NAME=Wee2-D2_Local_Build_Server
      - LABELS=self-hosted,linux,x64,esphome,ota
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runner-data:/data
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/esphome/esphome/dev/resources/esphome.png"
      - "net.unraid.docker.shell=bash"
