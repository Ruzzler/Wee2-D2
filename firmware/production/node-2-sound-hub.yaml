# ==============================================================================
# Wee2-D2: Sound Hub / Audio Controller (Node 2)
# v2.6.0-Dashboard | DASHBOARD HOST + ESP-NOW RELAY GATEWAY
# ==============================================================================

substitutions:
  node_name: "wee2d2-sound-hub"
  fw_version: "2.6.0-Dashboard"
  
  # --- PINS (S3 Super Mini) ---
  # Moved off GPIO 43/44 (UART0): ESP32-S3 boot ROM spams 115200-baud log
  # output on GPIO 43 at every reset, which puts DFPlayer Mini clones into
  # a sulk state at their 9600-baud serial input. GPIO 12/13 are clean.
  sfx_tx_pin: "GPIO12"
  sfx_rx_pin: "GPIO13"

# --- CORE CONFIGURATION ---
esphome:
  name: ${node_name}
  friendly_name: "Wee2-D2 Sound Hub"
  project:
    name: "ruzzler.wee2-d2"
    version: ${fw_version}
  libraries:
    - FS
  platformio_options:
    idf_component_manager: "no"
  includes:
    - include/system_dashboard.h
  on_boot:
    - priority: 900.0
      then:
        - dfplayer.set_volume: 26
        - logger.log: "BOOT: Volume set 26/30"
    - priority: -200
      then:
        - lambda: |-
            id(wsb)->add_handler(new DashboardHandler());
            id(wsb)->add_handler(new StatusHandler());
            ESP_LOGI("dash", "Neural Command Center live at /dash (status at /status)");

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

wifi:
  # The main network connection
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      channel: 11
      priority: 0
  
  # Fallback Hotspot
  ap:
    ssid: "Wee2d2-Sound Setup"
    password: "wee2d2setup"
    ap_timeout: 1min
    channel: 11

  # Required for instant response to Node 1 triggers
  fast_connect: true
  power_save_mode: none
  output_power: 8.5dBm

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG
  hardware_uart: USB_CDC
  baud_rate: 115200

# --- DIAGNOSTICS ---
text_sensor:
  - platform: template
    name: "Node 2 Firmware Version"
    id: fw_ver_sensor
    lambda: return {"${fw_version}"};
    icon: "mdi:alpha-v-circle-outline"
    entity_category: diagnostic
    update_interval: 1h
  # WiFi connection info — exposed to /status endpoint
  - platform: wifi_info
    ip_address:
      name: "Node 2 IP"
      id: wifi_ip_sensor
    ssid:
      name: "Node 2 SSID"
      id: wifi_ssid_sensor
    mac_address:
      name: "Node 2 MAC"
      id: wifi_mac_sensor

sensor:
  - platform: wifi_signal
    name: "Node 2 WiFi Signal"
    id: wifi_rssi_sensor
    update_interval: 10s
  - platform: uptime
    name: "Node 2 Uptime"
    id: up_time_sensor

web_server_base:
  id: wsb

web_server:
  port: 80

# --- RELAY SCRIPTS (Node 2 -> Node 1 via ESP-NOW) ---
# Dashboard calls Node 2 HTTP endpoints, which execute these scripts.
# The scripts forward commands to Node 1 over the radio — no WiFi needed.
script:
  - id: relay_animation
    parameters:
      anim_id: int
    then:
      - espnow.send:
          address: !secret node1_mac
          data: !lambda 'return {(uint8_t)0xA0, (uint8_t)anim_id};'
      - logger.log:
          format: "Relay: Animation 0x%02X -> Node 1"
          args: ['anim_id']

  - id: relay_lighting
    parameters:
      preset_id: int
    then:
      - espnow.send:
          address: !secret node1_mac
          data: !lambda 'return {(uint8_t)0xA1, (uint8_t)preset_id};'
      - logger.log:
          format: "Relay: Lighting preset %d -> Node 1"
          args: ['preset_id']

  - id: relay_dome_speed
    parameters:
      speed_x100: int
    then:
      - espnow.send:
          address: !secret node1_mac
          data: !lambda 'return {(uint8_t)0xA2, (uint8_t)speed_x100};'
      - logger.log:
          format: "Relay: Dome speed %d/100 -> Node 1"
          args: ['speed_x100']

  - id: relay_estop_all
    then:
      # Local: stop audio immediately
      - dfplayer.stop:
      # Remote: tell Node 1 to stop everything
      - espnow.send:
          address: !secret node1_mac
          data: !lambda 'return {(uint8_t)0xA0, (uint8_t)0xFF};'
      - logger.log: "EMERGENCY STOP: Local audio killed + Node 1 notified"

# --- AUDIO HARDWARE ---
uart:
  - id: sfx_bus
    tx_pin: ${sfx_tx_pin}
    rx_pin: ${sfx_rx_pin}
    baud_rate: 9600

dfplayer:
  uart_id: sfx_bus
  id: droid_sfx

# --- GLOBALS for Node 1 status tracking ---
globals:
  - id: node1_last_seen_ms
    type: uint32_t
    initial_value: '0'
  - id: node1_heartbeat_count
    type: uint32_t
    initial_value: '0'

# --- ESP-NOW RECEIVER (DIRECTED HANDSHAKE) ---
espnow:
  # Formally registers Node 1 so the ESP32 accepts incoming targeted commands
  peers:
    - !secret node1_mac
  on_receive:
    - lambda: |-
        if (size < 1) return;
        uint8_t command = data[0];

        switch (command) {
          // ── Sound triggers from Node 1 animations (legacy 1-byte) ──
          case 0x01: // Idle Chirps
            ESP_LOGI("espnow", "Sound cmd 0x01 (idle)");
            id(droid_sfx).play_folder(1, (rand() % 20) + 1);
            break;
          case 0x02: // Angry/Scream
            ESP_LOGI("espnow", "Sound cmd 0x02 (angry)");
            id(droid_sfx).play_folder(2, (rand() % 20) + 1);
            break;
          case 0x03: // Dance — generic dance music
            ESP_LOGI("espnow", "Sound cmd 0x03 (dance)");
            id(droid_sfx).play_folder(13, 1);
            break;
          case 0x04: // Cantina — plays full cantina band
            ESP_LOGI("espnow", "Sound cmd 0x04 (cantina)");
            id(droid_sfx).play_folder(13, 2);
            break;
          case 0x99: // Emergency Stop Audio
            ESP_LOGI("espnow", "Sound cmd 0x99 (stop)");
            id(droid_sfx).stop();
            break;

          // ── Heartbeat ping from Node 1 (every 5s) ──
          case 0xB0:
            id(node1_last_seen_ms) = millis();
            id(node1_heartbeat_count) += 1;
            ESP_LOGV("heartbeat", "Node 1 alive (ping #%u)", (unsigned)id(node1_heartbeat_count));
            break;

          default:
            ESP_LOGW("espnow", "Unknown command received: 0x%02X", command);
            break;
        }

