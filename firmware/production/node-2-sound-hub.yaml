# --- NUMBERS (Volume + Dome Speed Relay) ---
number:
  - platform: template
    name: "Audio Volume"
    id: audio_volume
    icon: "mdi:volume-high"
    min_value: 1
    max_value: 26
    step: 1
    optimistic: true
    initial_value: 26
    restore_value: true
    on_value:
      then:
        - dfplayer.set_volume: !lambda 'return (int)x;'

  # Relay dome speed to Node 1 via ESP-NOW (expressed 10-100 = 0.10-1.00)
  - platform: template
    name: "Relay Dome Speed"
    id: relay_dome_speed_num
    icon: "mdi:speedometer"
    min_value: 10
    max_value: 100
    step: 5
    optimistic: true
    initial_value: 60
    on_value:
      then:
        - script.execute:
            id: relay_dome_speed
            speed_x100: !lambda 'return (int)x;'

# --- SELECT (Lighting Preset Relay) ---
# Mirrors Node 1's lighting preset select. Dashboard calls this via
# POST /select/relay_lighting_preset/set?option=NAME  (same-origin, no CORS)
select:
  - platform: template
    name: "Relay Lighting Preset"
    id: relay_lighting_select
    optimistic: true
    options:
      - "1977 Idle"
      - "Neural Processing"
      - "Full Alert"
      - "All Off"
      - "Front Logic Only"
      - "Rear Logic Only"
      - "PSI Scan"
      - "Data Transfer"
      - "Leia Message"
      - "Disco Mode"
      - "Stealth"
      - "Startup Sequence"
      - "Malfunction"
      - "Celebration"
      - "Imperial March"
    initial_option: "1977 Idle"
    on_value:
      - lambda: |-
          int ps = -1;
          if (x == "1977 Idle") ps = 1;
          else if (x == "Neural Processing") ps = 2;
          else if (x == "Full Alert") ps = 3;
          else if (x == "All Off") ps = 0;
          else if (x == "Front Logic Only") ps = 5;
          else if (x == "Rear Logic Only") ps = 6;
          else if (x == "PSI Scan") ps = 7;
          else if (x == "Data Transfer") ps = 8;
          else if (x == "Leia Message") ps = 9;
          else if (x == "Disco Mode") ps = 10;
          else if (x == "Stealth") ps = 11;
          else if (x == "Startup Sequence") ps = 12;
          else if (x == "Malfunction") ps = 13;
          else if (x == "Celebration") ps = 14;
          else if (x == "Imperial March") ps = 15;
          if (ps >= 0) id(relay_lighting).execute(ps);