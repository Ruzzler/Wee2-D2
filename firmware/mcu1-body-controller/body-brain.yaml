esphome:
  name: rc-sound-controller
  friendly_name: RC Sound Controller
  on_boot:
    priority: -100.0 # Runs after components are initialized
    then:
      # Set the initial bank status on startup
      - lambda: |-
          id(bank_status).publish_state("Bank " + to_string(id(current_bank) + 1));

esp32:
  board: esp32dev # ESP32D Dev Board
  framework:
    type: arduino

# Enable logging
logger:
  level: WARN

# UDNS Serial Bus (To Dome)
uart:
  id: udns_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 115200

# Enable Home Assistant API
api:

# Enable Over-The-Air updates
ota:
  platform: esphome

wifi:
  ssid: "PLACEHOLDER_SSID"
  password: "PLACEHOLDER_PASSWORD"

# Status LED for Heartbeat
status_led:
  pin: GPIO2

globals:
  # Using -1 as the initial state forces the first reading to be registered as a change
  - id: prev_ch4_state
    type: int
    initial_value: '-1'
  - id: prev_ch5_state
    type: int
    initial_value: '-1'
  - id: current_bank
    type: int
    initial_value: '0' # 0=Bank 1, 1=Bank 2, 2=Bank 3, 3=Bank 4 (Auto)
  - id: auto_sound_timer
    type: int
    initial_value: '0'

text_sensor:
  - platform: template
    id: bank_status
    name: "Sound Bank Status"
    icon: "mdi:numeric"

switch:
  - platform: gpio
    pin: GPIO4
    id: s1_trigger
    name: "Sound S1"
    inverted: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: s1_trigger
  - platform: gpio
    pin: GPIO5
    id: s2_trigger
    name: "Sound S2"
    inverted: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: s2_trigger
  - platform: gpio
    pin: GPIO26
    id: s3_trigger
    name: "Sound S3"
    inverted: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: s3_trigger
  - platform: gpio
    pin: GPIO27
    id: s4_trigger
    name: "Sound S4"
    inverted: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: s4_trigger
  - platform: gpio
    pin: GPIO18
    id: s5_trigger
    name: "Sound S5"
    inverted: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: s5_trigger
  - platform: gpio
    pin: GPIO19
    id: s6_trigger
    name: "Sound S6"
    inverted: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: s6_trigger
  - platform: gpio
    pin: GPIO21
    id: s7_trigger
    name: "Sound S7"
    inverted: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: s7_trigger
  - platform: gpio
    pin: GPIO22
    id: s8_trigger
    name: "Sound S8"
    inverted: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: s8_trigger
  - platform: gpio
    pin: GPIO23
    id: s9_trigger
    name: "Sound S9"
    inverted: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: s9_trigger

button:
  - platform: template
    name: "Test Dome: Red Alert"
    icon: "mdi:lightbulb-alert"
    on_press:
      then:
        # Standard WLED JSON API command over serial to turn everything RED
        - uart.write: '{"seg":{"col":[[255,0,0]]}}'

sensor:
  # CH5 (Bank Cycle Switch)
  - platform: pulse_width
    pin: GPIO32
    name: "RC CH5 Pulse Width"
    unit_of_measurement: 'µs'
    update_interval: 50ms
    filters:
      - multiply: 1000000.0
    on_value:
      then:
        - lambda: |-
            if (x > 0) {
              int current_state = (x > 1500) ? 1 : 0;
              if (current_state != id(prev_ch5_state)) {
                id(current_bank) = (id(current_bank) + 1) % 4; // Now cycles through 4 banks
                if (id(current_bank) == 3) {
                  id(bank_status).publish_state("Bank 4 (Auto)");
                } else {
                  id(bank_status).publish_state("Bank " + to_string(id(current_bank) + 1));
                }
                id(prev_ch5_state) = current_state;
                id(auto_sound_timer) = 0;  // Reset auto timer on any bank switch
              }
            }

  # CH3 (Sound Trigger)
  - platform: pulse_width
    pin: GPIO25
    name: "RC CH3 Pulse Width"
    unit_of_measurement: 'µs'
    update_interval: 50ms
    filters:
      - multiply: 1000000.0
    on_value:
      then:
        - lambda: |-
            if (x > 0) {
              int current_state = (x > 1500) ? 1 : 0;
              if (current_state != id(prev_ch3_state)) {
                if (id(current_bank) == 0) {
                  if (current_state == 1) id(s1_trigger).turn_on(); else id(s2_trigger).turn_on();
                } else if (id(current_bank) == 1) {
                  if (current_state == 1) id(s5_trigger).turn_on(); else id(s6_trigger).turn_on();
                } else if (id(current_bank) == 2) {
                  if (current_state == 1) id(s9_trigger).turn_on();
                }
                id(prev_ch3_state) = current_state;
              }
            }

  # CH4 (Sound Trigger)
  - platform: pulse_width
    pin: GPIO33
    name: "RC CH4 Pulse Width"
    unit_of_measurement: 'µs'
    update_interval: 50ms
    filters:
      - multiply: 1000000.0
    on_value:
      then:
        - lambda: |-
            if (x > 0) {
              int current_state = (x > 1500) ? 1 : 0;
              if (current_state != id(prev_ch4_state)) {
                if (id(current_bank) == 0) {
                  if (current_state == 1) id(s3_trigger).turn_on(); else id(s4_trigger).turn_on();
                } else if (id(current_bank) == 1) {
                  if (current_state == 1) id(s7_trigger).turn_on(); else id(s8_trigger).turn_on();
                }
                id(prev_ch4_state) = current_state;
              }
            }

# This section runs every second to handle the auto mode logic
interval:
  - interval: 1s
    then:
      - lambda: |-
          if (id(current_bank) == 3) { // Check if we are in Bank 4 (Auto Mode)
            if (id(auto_sound_timer) <= 0) {
              int random_sound_index = esp_random() % 9; // 0-8 for 9 sounds
              id(play_random_sound).execute(random_sound_index);
              id(auto_sound_timer) = (esp_random() % 11) + 5; // Set next delay for 5-15 seconds
            } else {
              id(auto_sound_timer) = id(auto_sound_timer) - 1;
            }
          }

# This script can be called to play a sound by its index (0-8)
script:
  - id: play_random_sound
    parameters:
      index: int
    then:
      - if:
          condition:
            lambda: 'return index == 0;'
          then:
            - switch.turn_on: s1_trigger
      - if:
          condition:
            lambda: 'return index == 1;'
          then:
            - switch.turn_on: s2_trigger
      - if:
          condition:
            lambda: 'return index == 2;'
          then:
            - switch.turn_on: s3_trigger
      - if:
          condition:
            lambda: 'return index == 3;'
          then:
            - switch.turn_on: s4_trigger
      - if:
          condition:
            lambda: 'return index == 4;'
          then:
            - switch.turn_on: s5_trigger
      - if:
          condition:
            lambda: 'return index == 5;'
          then:
            - switch.turn_on: s6_trigger
      - if:
          condition:
            lambda: 'return index == 6;'
          then:
            - switch.turn_on: s7_trigger
      - if:
          condition:
            lambda: 'return index == 7;'
          then:
            - switch.turn_on: s8_trigger
      - if:
          condition:
            lambda: 'return index == 8;'
          then:
            - switch.turn_on: s9_trigger
